<main id="radio-grid">
    <!-- Card 1: No Agenda -->
    <sl-card class="radio-card">
        <div class="card-container">
            <div class="logo-container">
                <img class="radio-logo" src="assets/No_Agenda_cover_placeholder.jpg" alt="No Agenda">
                <div class="controls">
                    <sl-button class="play-radio" variant="primary" data-title="No Agenda Live">
                        <sl-icon slot="prefix" name="play-circle-fill"></sl-icon> Play
                    </sl-button>
                    <sl-button class="stop-radio" variant="danger">
                        <sl-icon slot="prefix" name="stop-fill"></sl-icon> Stop
                    </sl-button>
                </div>
            </div>
            <div class="info">
                <div class="header"><strong>No Agenda Live</strong></div>
                <div class="footer">
                    <audio class="audio" src="https://listen.noagendastream.com/noagenda?type=.mp3" crossorigin="anonymous"></audio>
                    <canvas class="visualizer" width="300" height="100"></canvas>
                    <sl-range class="volume-control" min="0" max="100" value="50"></sl-range>
                </div>
            </div>
        </div>
    </sl-card>

    <!-- Card 2: Infowars (Make sure this starts AFTER the first </sl-card>) -->
    <sl-card class="radio-card">
        <div class="card-container">
            <div class="logo-container">
                <img class="radio-logo" src="assets/INFOWARS 1.jpg" alt="Infowars">
                <div class="controls">
                    <sl-button class="play-radio" variant="primary" data-title="Infowars">
                        <sl-icon slot="prefix" name="play-circle-fill"></sl-icon> Play
                    </sl-button>
                    <sl-button class="stop-radio" variant="danger">
                        <sl-icon slot="prefix" name="stop-fill"></sl-icon> Stop
                    </sl-button>
                </div>
            </div>
            <div class="info">
                <sl-select class="stream-selector" value="https://stream.alexjones.media/alexjonesshow.mp3" size="small">
                    <sl-option value="https://stream.alexjones.media/alexjonesshow.mp3">Alex Jones (MP3)</sl-option>
                    <sl-option value="https://stream.alexjones.media/warroom/">War Room</sl-option>
                </sl-select>
                <div class="footer">
                    <audio class="audio" src="https://stream.alexjones.media/alexjonesshow.mp3" crossorigin="anonymous"></audio>
                    <canvas class="visualizer" width="300" height="100"></canvas>
                    <sl-range class="volume-control" min="0" max="100" value="50"></sl-range>
                </div>
            </div>
        </div>
    </sl-card>
</main>
